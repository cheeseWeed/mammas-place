<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Due Today Quiz</title>
<style>
:root {
  --primary: #581c87;
  --primary-hover: #6b21a8;
  --accent: #facc15;
  --green: #16a34a;
  --red: #dc2626;
  --gray: #71717a;
  --text: #18181b;
  --bg: #fafafa;
  --card-bg: #ffffff;
  --border: #e4e4e7;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 760px;
  margin: 0 auto;
  padding: 24px;
  color: var(--text);
  background: var(--bg);
  line-height: 1.5;
}
h1 { color: var(--primary); margin: 0 0 6px; }
.subtitle { color: var(--gray); margin: 0 0 20px; font-size: 0.95em; }
.card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.q-num { color: var(--gray); font-size: 0.85em; margin-bottom: 4px; }
.q-text { font-size: 1.1em; font-weight: 600; margin: 0 0 14px; }
.choices { list-style: none; padding: 0; margin: 0; }
.choices li { margin: 0 0 8px; }
.choice-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: white;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.98em;
}
.choice-btn:hover:not(:disabled) { background: #f9fafb; border-color: var(--primary); }
.choice-btn:disabled { cursor: default; }
.choice-btn.correct { background: #dcfce7; border-color: var(--green); }
.choice-btn.wrong { background: #fee2e2; border-color: var(--red); }
.choice-btn.show-correct { background: #dcfce7; border-color: var(--green); }
.explanation { margin-top: 12px; padding: 12px; background: #fefce8; border-left: 4px solid var(--accent); border-radius: 4px; font-size: 0.92em; }
.btn {
  display: inline-block;
  background: var(--primary);
  color: white;
  padding: 10px 18px;
  text-decoration: none;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.95em;
  border: none;
  cursor: pointer;
}
.btn:hover { background: var(--primary-hover); }
.btn-secondary { background: white; color: var(--primary); border: 1px solid var(--primary); }
.btn-secondary:hover { background: #faf5ff; }
.progress-bar { height: 6px; background: #e4e4e7; border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
.result-stat { font-size: 3em; font-weight: 700; color: var(--primary); line-height: 1; }
.result-stat.fail { color: var(--red); }
.result-stat.pass { color: var(--green); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
.empty-state h2 { color: var(--primary); }
.source-tag { color: var(--gray); font-size: 0.78em; margin-top: 10px; }
.back-link { display: inline-block; margin-bottom: 12px; color: var(--gray); text-decoration: none; font-size: 0.9em; }
.back-link:hover { color: var(--primary); }
.info-pill { display: inline-block; background: var(--accent); color: var(--text); padding: 3px 10px; border-radius: 12px; font-size: 0.8em; font-weight: 600; }
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
<!-- HOME-BTN v1 -->
<a href="../dashboard/index.html" style="position:fixed; top:12px; left:12px; z-index:9999; background:#581c87; color:white; text-decoration:none; padding:6px 14px; border-radius:6px; font-size:13px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; box-shadow:0 2px 6px rgba(0,0,0,0.15);">&larr; Home</a>


<h1 id="quiz-title">Due Today</h1>
<p class="subtitle" id="quiz-subtitle">Spaced repetition. The facts your brain is about to forget.</p>

<div id="progress-wrap" class="progress-bar" style="display:none;"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

<div id="quiz-root"></div>

<script>
// ============================================================
// Shared localStorage keys with dashboard + weak spots
// ============================================================
var LS = {
  attempts: 'dl_attempts',
  misses: 'dl_misses',
  sr: 'dl_sr'
};
var DAY_MS = 86400000;
var QUIZ_NAME = 'Due Today';
var QUIZ_KEY = 'due-today';
var QUESTIONS_URL = '../data/questions.json';
var TARGET_MIN = 15;
var TARGET_MAX = 25;

// ============================================================
// safe storage
// ============================================================
function lsGet(key, fallback) {
  try {
    var raw = localStorage.getItem(key);
    if (raw === null || raw === undefined) return fallback;
    return JSON.parse(raw);
  } catch (e) { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); }
  catch (e) {}
}
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c];
  });
}
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ============================================================
// Spaced repetition (same algorithm as weak-spots.html)
// Correct: interval = min(prev * 2.5, 30), next_due = now + interval
// Wrong:   interval = 1, next_due = now + 1 day
// First-time miss: interval = 1
// ============================================================
function updateSR(factId, correct) {
  if (!factId) return;
  var sr = lsGet(LS.sr, {});
  var rec = sr[factId] || { interval_days: 0, ease: 2.5, next_due_ts: 0 };
  var now = Date.now();
  if (correct) {
    var prev = rec.interval_days || 1;
    rec.interval_days = Math.min(Math.round(prev * 2.5), 30);
    if (rec.interval_days < 1) rec.interval_days = 1;
  } else {
    rec.interval_days = 1;
  }
  rec.next_due_ts = now + rec.interval_days * DAY_MS;
  rec.last_seen_ts = now;
  sr[factId] = rec;
  lsSet(LS.sr, sr);
}
function recordMiss(factId) {
  if (!factId) return;
  var misses = lsGet(LS.misses, []);
  misses.push(factId);
  if (misses.length > 500) misses = misses.slice(misses.length - 500);
  lsSet(LS.misses, misses);
}
function recordAttempt(quizName, score, total) {
  var attempts = lsGet(LS.attempts, []);
  var pct = total > 0 ? (score / total) * 100 : 0;
  attempts.push({
    quiz: quizName,
    score: score,
    total: total,
    pct: pct,
    pass: pct >= 80,
    ts: Date.now()
  });
  if (attempts.length > 200) attempts = attempts.slice(attempts.length - 200);
  lsSet(LS.attempts, attempts);
  // DL_SYNC_BLOCK
  try {
    var __dlUser = localStorage.getItem("dl_user");
    if (__dlUser && __dlUser !== "__anon__") {
      fetch("/api/drive/progress", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user: __dlUser.replace(/^"|"$/g, ""),
          attempts: JSON.parse(localStorage.getItem("dl_attempts") || "[]"),
          misses: JSON.parse(localStorage.getItem("dl_misses") || "[]"),
          unitScores: JSON.parse(localStorage.getItem("dl_unit_scores") || "{}"),
          sr: JSON.parse(localStorage.getItem("dl_sr") || "{}")
        }),
        keepalive: true
      }).catch(function(){});
    }
  } catch (e) {}
}

// ============================================================
// Question selection: Due Today
//   Find facts in dl_sr with next_due_ts <= now, pull questions
//   matching those fact_ids, target 15-25.
//   Sort by most overdue first.
// ============================================================
function selectDueQuestions(bank) {
  var sr = lsGet(LS.sr, {});
  var now = Date.now();
  var due = [];
  for (var fid in sr) {
    if (Object.prototype.hasOwnProperty.call(sr, fid)) {
      var rec = sr[fid];
      if (rec && rec.next_due_ts && rec.next_due_ts <= now) {
        due.push({ fid: fid, overdueMs: now - rec.next_due_ts });
      }
    }
  }
  if (!due.length) return [];
  // Most overdue first
  due.sort(function(a, b) { return b.overdueMs - a.overdueMs; });

  // Index by fact_id
  var byFact = {};
  for (var i = 0; i < bank.length; i++) {
    var q = bank[i];
    if (!q.canonical_fact_id) continue;
    if (!byFact[q.canonical_fact_id]) byFact[q.canonical_fact_id] = [];
    byFact[q.canonical_fact_id].push(q);
  }

  var picked = [];
  var seenIds = {};
  // First pass: one question per due fact (most overdue first)
  for (var d = 0; d < due.length && picked.length < TARGET_MAX; d++) {
    var pool = byFact[due[d].fid] || [];
    if (!pool.length) continue;
    var pick = pool[Math.floor(Math.random() * pool.length)];
    picked.push(pick);
    seenIds[pick.id] = true;
  }
  // Top up: second/third pass if under TARGET_MIN
  for (var pass = 0; pass < 2 && picked.length < TARGET_MIN; pass++) {
    for (var d = 0; d < due.length && picked.length < TARGET_MAX; d++) {
      var pool2 = (byFact[due[d].fid] || []).filter(function(q) { return !seenIds[q.id]; });
      if (!pool2.length) continue;
      var pick2 = pool2[Math.floor(Math.random() * pool2.length)];
      picked.push(pick2);
      seenIds[pick2.id] = true;
    }
  }
  return shuffle(picked).slice(0, TARGET_MAX);
}

// ============================================================
// QUIZ ENGINE (same shape as weak-spots.html)
// ============================================================
var STATE = { questions: [], idx: 0, score: 0, answered: false };

function loadBank() {
  return fetch(QUESTIONS_URL).then(function(r) {
    if (!r.ok) throw new Error('Failed to load questions.json: ' + r.status);
    return r.json();
  }).then(function(data) { return data.questions || []; });
}

function renderEmpty(msg) {
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('quiz-root').innerHTML =
    '<div class="card empty-state">' +
      '<h2>Nothing due right now</h2>' +
      '<p>' + escapeHtml(msg) + '</p>' +
      '<a class="btn" href="../dashboard/index.html">Back to dashboard</a>' +
    '</div>';
}

function renderQuestion() {
  STATE.answered = false;
  var q = STATE.questions[STATE.idx];
  if (!q) { renderResults(); return; }
  var choiceObjs = q.choices.map(function(c, i) { return { text: c, isCorrect: i === q.correct_index }; });
  var shuffled = shuffle(choiceObjs);
  STATE.currentShuffled = shuffled;
  var progressPct = ((STATE.idx) / STATE.questions.length) * 100;
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('progress-fill').style.width = progressPct + '%';
  var html =
    '<div class="card">' +
      '<div class="q-num">Question ' + (STATE.idx + 1) + ' of ' + STATE.questions.length + '</div>' +
      '<p class="q-text">' + escapeHtml(q.question) + '</p>' +
      '<ul class="choices" id="choices">';
  for (var i = 0; i < shuffled.length; i++) {
    html += '<li><button class="choice-btn" data-idx="' + i + '">' + escapeHtml(shuffled[i].text) + '</button></li>';
  }
  html +=
      '</ul>' +
      '<div id="feedback"></div>' +
      '<p class="source-tag">Source: Utah Driver Handbook, p. ' + (q.source_page || '?') + ' &middot; fact id: ' + escapeHtml(q.canonical_fact_id || '') + '</p>' +
    '</div>';
  document.getElementById('quiz-root').innerHTML = html;
  var btns = document.querySelectorAll('.choice-btn');
  for (var i = 0; i < btns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() { handleAnswer(parseInt(btn.dataset.idx, 10)); });
    })(btns[i]);
  }
}

function handleAnswer(chosenIdx) {
  if (STATE.answered) return;
  STATE.answered = true;
  var q = STATE.questions[STATE.idx];
  var shuffled = STATE.currentShuffled;
  var chosen = shuffled[chosenIdx];
  var correct = !!chosen.isCorrect;
  if (correct) STATE.score++;
  else recordMiss(q.canonical_fact_id);
  updateSR(q.canonical_fact_id, correct);

  var btns = document.querySelectorAll('.choice-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].disabled = true;
    if (shuffled[i].isCorrect) btns[i].classList.add('show-correct');
    if (i === chosenIdx) btns[i].classList.add(correct ? 'correct' : 'wrong');
  }
  var fb = document.getElementById('feedback');
  fb.innerHTML =
    '<div class="explanation">' +
      '<strong>' + (correct ? 'Correct.' : 'Not quite.') + '</strong> ' + escapeHtml(q.explanation || '') +
    '</div>' +
    '<button class="btn" id="next-btn" style="margin-top:12px;">' +
      (STATE.idx + 1 === STATE.questions.length ? 'See results' : 'Next question') +
    '</button>';
  document.getElementById('next-btn').addEventListener('click', function() {
    STATE.idx++;
    renderQuestion();
  });
}

function renderResults() {
  var total = STATE.questions.length;
  var pct = total > 0 ? (STATE.score / total) * 100 : 0;
  var pass = pct >= 80;
  recordAttempt(QUIZ_NAME, STATE.score, total);
  document.getElementById('progress-fill').style.width = '100%';
  var html =
    '<div class="card" style="text-align:center;">' +
      '<h2 style="color:var(--primary); margin-top:0;">Results</h2>' +
      '<div class="result-stat ' + (pass ? 'pass' : 'fail') + '">' + pct.toFixed(0) + '%</div>' +
      '<p>' + STATE.score + ' of ' + total + ' correct &middot; ' + (pass ? 'PASS' : 'Below 80%') + '</p>' +
      '<p style="color:var(--gray); font-size:0.9em;">' +
        (pass
          ? 'Solid recall. Facts you nailed will reappear later (the interval just grew). Check back tomorrow.'
          : 'These facts need another pass. They will reappear tomorrow in Due Today.') +
      '</p>' +
      '<a class="btn" href="../dashboard/index.html">Back to dashboard</a>' +
    '</div>';
  document.getElementById('quiz-root').innerHTML = html;
  if (typeof confetti === 'function' && pct >= 80) {
    var fireworks = function(x) {
      confetti({ particleCount: 60, angle: 90, spread: 100, origin: { x: x, y: 0.7 }, colors: ['#facc15', '#581c87', '#16a34a', '#dc2626', '#3b82f6'] });
    };
    setTimeout(function() { fireworks(0.2); }, 100);
    setTimeout(function() { fireworks(0.5); }, 400);
    setTimeout(function() { fireworks(0.8); }, 700);
    setTimeout(function() { fireworks(0.3); }, 1100);
    setTimeout(function() { fireworks(0.7); }, 1400);
    setTimeout(function() { fireworks(0.5); }, 1700);
  }
}

// ============================================================
// BOOT
// ============================================================
loadBank().then(function(bank) {
  var picked = selectDueQuestions(bank);
  if (!picked.length) {
    renderEmpty('All caught up. Spaced repetition only shows facts whose review window has come due. Come back tomorrow, or take a unit test to add more facts to the queue.');
    return;
  }
  STATE.questions = picked;
  renderQuestion();
}).catch(function(err) {
  renderEmpty('Could not load the question bank (' + err.message + '). Check that data/questions.json exists.');
});
</script>

</body></html>
