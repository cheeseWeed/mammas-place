<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#E0F2FE"/>
  <!-- Molar crown - wide and squat -->
  <rect x="110" y="120" width="180" height="140" rx="18" fill="#BAE6FD" stroke="#2d2d2d" stroke-width="5"/>
  <!-- Chewing surface grooves -->
  <path d="M155,155 Q170,175 155,195" fill="none" stroke="#7DD3FC" stroke-width="5" stroke-linecap="round"/>
  <path d="M200,145 L200,205" fill="none" stroke="#7DD3FC" stroke-width="5" stroke-linecap="round"/>
  <path d="M245,155 Q230,175 245,195" fill="none" stroke="#7DD3FC" stroke-width="5" stroke-linecap="round"/>
  <!-- Three roots -->
  <rect x="128" y="255" width="38" height="80" rx="12" fill="#BAE6FD" stroke="#2d2d2d" stroke-width="5"/>
  <rect x="181" y="255" width="38" height="90" rx="12" fill="#BAE6FD" stroke="#2d2d2d" stroke-width="5"/>
  <rect x="234" y="255" width="38" height="80" rx="12" fill="#BAE6FD" stroke="#2d2d2d" stroke-width="5"/>
  <!-- Cover root join -->
  <rect x="110" y="248" width="180" height="18" fill="#BAE6FD"/>
  <!-- Shine -->
  <path d="M125,138 Q145,125 165,132" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <text x="295" y="130" font-size="36" fill="#fbbf24">✦</text>
</svg>
