<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </radialGradient>

    <!-- Body - warm golden brown, 3D lit from top-left -->
    <radialGradient id="bodyG" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#fde8b0"/>
      <stop offset="35%" stop-color="#e8a84a"/>
      <stop offset="70%" stop-color="#c47820"/>
      <stop offset="100%" stop-color="#8b4e10"/>
    </radialGradient>

    <!-- Head -->
    <radialGradient id="headG" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#fde8b0"/>
      <stop offset="40%" stop-color="#e8a84a"/>
      <stop offset="75%" stop-color="#c47820"/>
      <stop offset="100%" stop-color="#8b4e10"/>
    </radialGradient>

    <!-- Snout -->
    <radialGradient id="snoutG" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde0c0"/>
      <stop offset="60%" stop-color="#d4906a"/>
      <stop offset="100%" stop-color="#a85030"/>
    </radialGradient>

    <!-- Leg -->
    <radialGradient id="legG" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#fde8b0"/>
      <stop offset="50%" stop-color="#c47820"/>
      <stop offset="100%" stop-color="#7a3c0a"/>
    </radialGradient>

    <!-- Hoof - deep purple glossy -->
    <radialGradient id="hoofG" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>

    <!-- Eye -->
    <radialGradient id="eyeG" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="60%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </radialGradient>

    <!-- Iris -->
    <radialGradient id="irisG" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#312e81"/>
    </radialGradient>

    <!-- Rainbow mane strand gradients -->
    <linearGradient id="r1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </linearGradient>
    <linearGradient id="r2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <linearGradient id="r3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd32a"/>
      <stop offset="100%" stop-color="#f9ca24"/>
    </linearGradient>
    <linearGradient id="r4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0be881"/>
      <stop offset="100%" stop-color="#05c46b"/>
    </linearGradient>
    <linearGradient id="r5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4bcffa"/>
      <stop offset="100%" stop-color="#0fbcf9"/>
    </linearGradient>
    <linearGradient id="r6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cd84f1"/>
      <stop offset="100%" stop-color="#a55eea"/>
    </linearGradient>

    <!-- Tail gradient -->
    <linearGradient id="tailG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="20%" stop-color="#ff9f43"/>
      <stop offset="40%" stop-color="#ffd32a"/>
      <stop offset="60%" stop-color="#0be881"/>
      <stop offset="80%" stop-color="#4bcffa"/>
      <stop offset="100%" stop-color="#cd84f1"/>
    </linearGradient>

    <!-- Ear inner pink -->
    <radialGradient id="earG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </radialGradient>

    <!-- Soft shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#7a3c0a" flood-opacity="0.25"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#4c1d95" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="40"/>

  <!-- Ground shadow -->
  <ellipse cx="208" cy="374" rx="115" ry="11" fill="#c47820" opacity="0.2"/>

  <!-- TAIL - thick flowing rainbow, layered for 3D depth -->
  <path d="M296,205 Q358,172 364,222 Q370,268 336,278 Q355,255 348,228 Q340,202 296,208Z" fill="url(#tailG)" filter="url(#shadow)" opacity="0.95"/>
  <!-- Tail gloss -->
  <path d="M306,210 Q342,192 350,220" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.3"/>

  <!-- BODY -->
  <ellipse cx="208" cy="252" rx="112" ry="80" fill="url(#bodyG)" filter="url(#shadow)"/>
  <!-- Body top gloss -->
  <ellipse cx="175" cy="210" rx="58" ry="26" fill="white" opacity="0.18" transform="rotate(-12,175,210)"/>
  <!-- Body side ambient -->
  <ellipse cx="270" cy="280" rx="38" ry="24" fill="#7a3c0a" opacity="0.15"/>

  <!-- NECK -->
  <path d="M143,192 Q136,150 157,134 Q176,118 200,128 Q210,155 202,188Z" fill="url(#headG)" filter="url(#shadow)"/>
  <!-- Neck gloss -->
  <ellipse cx="165" cy="152" rx="14" ry="22" fill="white" opacity="0.14" transform="rotate(-8,165,152)"/>

  <!-- MANE - 6 rounded ribbon strands, each 3D shaded -->
  <!-- Red strand -->
  <path d="M166,192 Q144,156 150,116 Q156,88 178,76" fill="none" stroke="url(#r1)" stroke-width="14" stroke-linecap="round"/>
  <path d="M167,191 Q147,158 153,118 Q159,90 180,78" fill="none" stroke="#ff9999" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  <!-- Orange strand -->
  <path d="M174,191 Q155,155 163,115 Q170,87 192,75" fill="none" stroke="url(#r2)" stroke-width="12" stroke-linecap="round"/>
  <path d="M175,190 Q157,157 165,117 Q172,89 193,77" fill="none" stroke="#ffcf9e" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  <!-- Yellow strand -->
  <path d="M181,190 Q165,153 175,113 Q183,85 205,74" fill="none" stroke="url(#r3)" stroke-width="10" stroke-linecap="round"/>
  <path d="M182,189 Q167,155 177,115 Q185,87 206,76" fill="none" stroke="#fff0a0" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  <!-- Green strand -->
  <path d="M187,188 Q174,151 186,111 Q195,83 216,72" fill="none" stroke="url(#r4)" stroke-width="9" stroke-linecap="round"/>
  <!-- Blue strand -->
  <path d="M192,185 Q182,148 196,109 Q206,81 226,71" fill="none" stroke="url(#r5)" stroke-width="8" stroke-linecap="round"/>
  <!-- Purple strand -->
  <path d="M197,182 Q189,145 204,107 Q215,79 234,70" fill="none" stroke="url(#r6)" stroke-width="7" stroke-linecap="round"/>

  <!-- HEAD -->
  <circle cx="160" cy="130" r="53" fill="url(#headG)" filter="url(#shadow)"/>
  <!-- Head top gloss -->
  <ellipse cx="143" cy="110" rx="22" ry="15" fill="white" opacity="0.22" transform="rotate(-15,143,110)"/>

  <!-- EAR -->
  <ellipse cx="200" cy="92" rx="14" ry="20" fill="url(#headG)" transform="rotate(20,200,92)"/>
  <ellipse cx="200" cy="94" rx="8" ry="13" fill="url(#earG)" transform="rotate(20,200,94)"/>

  <!-- SNOUT -->
  <ellipse cx="128" cy="150" rx="26" ry="20" fill="url(#snoutG)"/>
  <!-- Snout gloss -->
  <ellipse cx="120" cy="143" rx="10" ry="7" fill="white" opacity="0.25"/>
  <!-- Nostrils -->
  <ellipse cx="120" cy="154" rx="7" ry="5" fill="#8b3020" opacity="0.55"/>
  <ellipse cx="136" cy="154" rx="7" ry="5" fill="#8b3020" opacity="0.55"/>
  <!-- Smile -->
  <path d="M116,162 Q128,170 140,162" fill="none" stroke="#8b3020" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- EYE socket -->
  <circle cx="155" cy="120" r="17" fill="url(#eyeG)"/>
  <!-- Iris -->
  <circle cx="155" cy="120" r="11" fill="url(#irisG)"/>
  <!-- Pupil -->
  <circle cx="155" cy="120" r="6" fill="#0a0820"/>
  <!-- Eye shine - main -->
  <circle cx="148" cy="113" r="5" fill="white" opacity="0.95"/>
  <!-- Eye shine - small -->
  <circle cx="160" cy="125" r="2.5" fill="white" opacity="0.6"/>

  <!-- Eyelashes -->
  <path d="M143,110 Q147,103 153,108" fill="none" stroke="#1e1b4b" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M149,107 Q154,100 159,106" fill="none" stroke="#1e1b4b" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M156,106 Q161,100 165,106" fill="none" stroke="#1e1b4b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="138" cy="136" rx="13" ry="8" fill="#f472b6" opacity="0.3"/>

  <!-- LEGS - 4, rounded cylinders with 3D shading -->
  <!-- Front left leg -->
  <rect x="141" y="314" width="30" height="54" rx="15" fill="url(#legG)" filter="url(#shadow)"/>
  <rect x="141" y="314" width="12" height="54" rx="10" fill="white" opacity="0.12"/>
  <!-- Hoof -->
  <ellipse cx="156" cy="368" rx="17" ry="10" fill="url(#hoofG)" filter="url(#softShadow)"/>
  <ellipse cx="151" cy="364" rx="6" ry="3" fill="white" opacity="0.3"/>

  <!-- Front right leg -->
  <rect x="178" y="318" width="30" height="50" rx="15" fill="url(#legG)" filter="url(#shadow)"/>
  <rect x="178" y="318" width="12" height="50" rx="10" fill="white" opacity="0.12"/>
  <ellipse cx="193" cy="368" rx="17" ry="10" fill="url(#hoofG)" filter="url(#softShadow)"/>
  <ellipse cx="188" cy="364" rx="6" ry="3" fill="white" opacity="0.3"/>

  <!-- Back left leg -->
  <rect x="240" y="314" width="30" height="54" rx="15" fill="url(#legG)" filter="url(#shadow)"/>
  <rect x="240" y="314" width="12" height="54" rx="10" fill="white" opacity="0.12"/>
  <ellipse cx="255" cy="368" rx="17" ry="10" fill="url(#hoofG)" filter="url(#softShadow)"/>
  <ellipse cx="250" cy="364" rx="6" ry="3" fill="white" opacity="0.3"/>

  <!-- Back right leg -->
  <rect x="277" y="318" width="30" height="50" rx="15" fill="url(#legG)" filter="url(#shadow)"/>
  <rect x="277" y="318" width="12" height="50" rx="10" fill="white" opacity="0.12"/>
  <ellipse cx="292" cy="368" rx="17" ry="10" fill="url(#hoofG)" filter="url(#softShadow)"/>
  <ellipse cx="287" cy="364" rx="6" ry="3" fill="white" opacity="0.3"/>
</svg>
