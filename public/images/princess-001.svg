  <path d="M 318 65 L 320 55 L 322 65 L 332 67 L 322 69 L 320 79 L 318 69 L 308 67 Z" fill="#fbbf24" stroke="#92400e" stroke-width="1.5"/>
  <circle cx="90" cy="170" r="4" fill="#fbbf24" stroke="#92400e" stroke-width="1.5"/>
