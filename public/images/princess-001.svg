  <polygon points="282,310 285,320 296,320 287,326 290,336 282,330 274,336 277,326 268,320 279,320" fill="#fbbf24" stroke="#92400e" stroke-width="1.5"/>
  <polygon points="200,305 202,312 209,312 203,316 205,323 200,319 195,323 197,316 191,312 198,312" fill="#fbbf24" stroke="#92400e" stroke-width="1.5"/>

