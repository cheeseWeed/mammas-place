  <polygon points="290,195 293,206 305,206 295,213 298,224 290,217 282,224 285,213 275,206 287,206" fill="#fbbf24" stroke="#92400e" stroke-width="2.5"/>
  <circle cx="290" cy="209" r="4" fill="#ffffff" opacity="0.7"/>

  <!-- SHOES -->
  <ellipse cx="158" cy="362" rx="22" ry="9" fill="#EC4899" stroke="#9D174D" stroke-width="3"/>
  <rect x="148" y="353" width="14" height="12" rx="3" fill="#EC4899" stroke="#9D174D" stroke-width="3"/>
  <ellipse cx="242" cy="362" rx="22" ry="9" fill="#EC4899" stroke="#9D174D" stroke-width="3"/>
  <rect x="238" y="353" width="14" height="12" rx="3" fill="#EC4899" stroke="#9D174D" stroke-width="3"/>

